<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Optimized Copy</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    textarea { width: 100%; height: 300px; padding: 10px; font-size: 14px; }
    button { margin-top: 10px; padding: 10px; background: #0078d4; color: white; border: none; cursor: pointer; }
    button:hover { background: #005a9e; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>Optimized Social Media Copy</h1>
  <div id="processState" style="color: #666; font-style: italic; margin-bottom: 8px;">Processing selection... waiting for AI response.</div>
  <div id="resultDisplay" style="border: 1px solid #ccc; padding: 10px; min-height: 300px; white-space: pre-wrap;"></div>
  <button id="copyBtn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z" fill="white"/>
    </svg>
    Copy to Clipboard
  </button>
  <button id="copyCloseBtn" style="margin-left: 10px; background: #28a745;">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z" fill="white"/>
    </svg>
    Copy & Close
  </button>
  <div id="modal" style="display:none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;">
    <div style="background: white; padding: 16px; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.3); max-width: 320px; text-align: center;">
      <p id="modalText" style="margin: 0 0 12px;">Copied to clipboard.</p>
      <button id="modalCloseBtn" style="padding: 8px 12px; background:#0078d4; color:white; border:none; cursor:pointer; border-radius:4px;">Close</button>
    </div>
  </div>
  <div id="errorMsg" class="error" style="display: none;">
    <p id="errorText"></p>
    <button id="openSettingsBtn">Settings öffnen</button>
  </div>
  <script src="result.js"></script>
</body>
</html>
