<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Optimized Copy</title>
  <style>
    :root {
      --color-brand: #0078D4;
      --color-brand-hover: #106EBE;
      --color-brand-pressed: #005A9E;
      --color-neutral-bg: #F5F5F5;
      --color-neutral-surface: #FFFFFF;
      --color-neutral-stroke: #D1D1D1;
      --color-neutral-stroke-subtle: #E8E8E8;
      --color-neutral-fg: #242424;
      --color-neutral-fg-secondary: #616161;
      --color-error: #C50F1F;
      --color-error-bg: #FDE7E9;
      --radius-small: 4px;
      --radius-medium: 8px;
      --shadow-2: 0 1px 2px rgba(0,0,0,.14), 0 0 2px rgba(0,0,0,.12);
      --shadow-8: 0 4px 8px rgba(0,0,0,.14), 0 0 2px rgba(0,0,0,.12);
      --font-family: 'Segoe UI Variable', 'Segoe UI', system-ui, sans-serif;
      --font-size-100: 12px;
      --font-size-200: 14px;
      --font-size-400: 20px;
      --font-weight-semibold: 600;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-family);
      font-size: var(--font-size-200);
      color: var(--color-neutral-fg);
      background: var(--color-neutral-bg);
      padding: 24px;
    }
    .app-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 24px;
    }
    .app-title {
      font-size: var(--font-size-400);
      font-weight: var(--font-weight-semibold);
    }
    .status-bar {
      font-size: var(--font-size-100);
      color: var(--color-neutral-fg-secondary);
      margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px;
      min-height: 20px;
    }
    .status-bar.loading::before {
      content: '';
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid var(--color-brand); border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-card {
      background: var(--color-neutral-surface);
      border: 1px solid var(--color-neutral-stroke-subtle);
      border-radius: var(--radius-medium);
      box-shadow: var(--shadow-2);
      padding: 16px;
      min-height: 240px;
      white-space: pre-wrap;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .optimization-section {
      margin-bottom: 16px;
    }
    .optimization-title {
      font-size: var(--font-size-200);
      font-weight: var(--font-weight-semibold);
      margin-bottom: 8px;
    }
    .optimization-cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 640px) {
      .optimization-cards { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 380px) {
      .optimization-cards { grid-template-columns: 1fr; }
    }
    .optimization-card {
      width: 100%;
      text-align: center;
      background: var(--color-neutral-surface);
      border: 1px solid var(--color-neutral-stroke);
      border-radius: var(--radius-medium);
      padding: 12px 8px;
      font-family: var(--font-family);
      font-size: var(--font-size-100);
      color: var(--color-neutral-fg);
      cursor: pointer;
      transition: border-color .1s, background .1s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .optimization-card svg {
      width: 20px;
      height: 20px;
      stroke: var(--color-brand);
      stroke-width: 2;
      fill: none;
    }
    .optimization-card:hover {
      border-color: var(--color-brand);
      background: #F0F6FC;
    }
    .optimization-card:disabled {
      opacity: .6;
      cursor: progress;
    }
    .optimization-loading {
      display: none;
      text-align: center;
      padding: 16px 8px;
      color: var(--color-neutral-fg-secondary);
      font-size: var(--font-size-100);
    }
    .optimization-loading.active {
      display: block;
    }
    .optimization-loading::before {
      content: '';
      display: inline-block;
      width: 12px;
      height: 12px;
      margin-right: 6px;
      border: 2px solid var(--color-brand);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 12px;
      border-radius: var(--radius-small);
      font-family: var(--font-family);
      font-size: var(--font-size-200);
      font-weight: var(--font-weight-semibold);
      cursor: pointer; border: 1px solid transparent;
      transition: background .1s;
    }
    .btn-primary { background: var(--color-brand); color: #fff; border-color: var(--color-brand); }
    .btn-primary:hover { background: var(--color-brand-hover); }
    .btn-primary:active { background: var(--color-brand-pressed); }
    .btn-secondary { background: var(--color-neutral-surface); color: var(--color-brand); border-color: var(--color-neutral-stroke); }
    .btn-secondary:hover { background: #F0F6FC; border-color: var(--color-brand); }
    .error-panel {
      display: none;
      background: var(--color-error-bg);
      border: 1px solid #F1707B;
      border-radius: var(--radius-medium);
      padding: 16px;
      margin-top: 16px;
      color: var(--color-error);
    }
    .error-panel p { margin-bottom: 8px; }
    .toast {
      display: none;
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--color-neutral-fg); color: #fff;
      padding: 8px 16px;
      border-radius: var(--radius-medium);
      box-shadow: var(--shadow-8);
      font-size: var(--font-size-200);
      z-index: 1000;
      animation: fadeIn .15s ease;
      white-space: nowrap;
      max-width: 90vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.warning {
      background: #FFF4CE;
      color: #7A4F00;
      border: 1px solid #F0D060;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    .image-section {
      margin-top: 16px;
      margin-bottom: 16px;
    }
    .image-section-title {
      font-size: var(--font-size-200);
      font-weight: var(--font-weight-semibold);
      margin-bottom: 8px;
    }
    .image-loading {
      display: none;
      text-align: center;
      padding: 16px 8px;
      color: var(--color-neutral-fg-secondary);
      font-size: var(--font-size-100);
    }
    .image-loading.active { display: block; }
    .image-loading::before {
      content: '';
      display: inline-block;
      width: 12px; height: 12px;
      margin-right: 6px;
      border: 2px solid var(--color-brand); border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    .image-preview-wrap {
      max-width: 320px;
      margin: 0 auto;
    }
    .image-preview-wrap img {
      width: 100%; height: auto;
      border-radius: var(--radius-medium);
      border: 1px solid var(--color-neutral-stroke-subtle);
      display: block;
    }
    .image-actions {
      display: flex; gap: 8px; margin-top: 8px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="13" height="13" fill="#F25022"/>
      <rect x="15" width="13" height="13" fill="#7FBA00"/>
      <rect y="15" width="13" height="13" fill="#00A4EF"/>
      <rect x="15" y="15" width="13" height="13" fill="#FFB900"/>
    </svg>
    <h1 class="app-title">Optimized Social Media Copy</h1>
  </header>

  <div id="processState" class="status-bar loading">Processing selection&hellip; waiting for AI response.</div>
  <div id="resultDisplay" class="result-card"></div>

  <section id="optimizationSection" class="optimization-section" style="display:none;">
    <h2 class="optimization-title">Try another optimization</h2>
    <div id="optimizationLoading" class="optimization-loading">Loading suggestions...</div>
    <div id="optimizationCards" class="optimization-cards"></div>
  </section>

  <section id="imageSection" class="image-section" style="display:none;">
    <h2 class="image-section-title">Promotional Image</h2>
    <div id="imageLoading" class="image-loading">Generating image&hellip;</div>
    <div id="imagePreviewWrap" class="image-preview-wrap" style="display:none;">
      <img id="generatedImage" src="" alt="Generated promotional image">
      <div class="image-actions">
        <button id="downloadImageBtn" class="btn btn-secondary">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" fill="currentColor"/>
          </svg>
          Download PNG
        </button>
      </div>
    </div>
  </section>

  <div class="actions">
    <button id="copyBtn" class="btn btn-primary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z" fill="currentColor"/>
      </svg>
      Copy to Clipboard
    </button>
    <button id="copyCloseBtn" class="btn btn-secondary">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z" fill="currentColor"/>
      </svg>
      Copy &amp; Close
    </button>
    <button id="createImageBtn" class="btn btn-secondary" style="display:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z" fill="currentColor"/>
      </svg>
      <span id="createImageBtnText">Create Image</span>
    </button>
  </div>

  <div id="errorMsg" class="error-panel">
    <p id="errorText"></p>
    <button id="openSettingsBtn" class="btn btn-secondary">Open Settings</button>
  </div>

  <div id="modal" class="toast"><span id="modalText"></span></div>

  <script src="result.js"></script>
</body>
</html>
